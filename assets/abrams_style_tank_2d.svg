<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Abrams style tank 2D game asset</title>
  <desc id="desc">A stylized side-view main battle tank SVG inspired by Abrams-like proportions for use in a contemporary game.</desc>
  <defs>
    <linearGradient id="sandBody" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d8c08b"/>
      <stop offset="55%" stop-color="#b9985d"/>
      <stop offset="100%" stop-color="#8b6b39"/>
    </linearGradient>
    <linearGradient id="sandPanel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e2cf9d"/>
      <stop offset="100%" stop-color="#a9874f"/>
    </linearGradient>
    <linearGradient id="oliveAccent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6b7055"/>
      <stop offset="100%" stop-color="#434733"/>
    </linearGradient>
    <linearGradient id="trackMetal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4c4f50"/>
      <stop offset="100%" stop-color="#232526"/>
    </linearGradient>
    <linearGradient id="barrelShade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d4c089"/>
      <stop offset="50%" stop-color="#927243"/>
      <stop offset="100%" stop-color="#6a502e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1c1c1c" flood-opacity="0.28"/>
    </filter>
    <style>
      .outline { stroke: #2a2418; stroke-width: 5; stroke-linejoin: round; stroke-linecap: round; }
      .thin { stroke: #3b3428; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
      .detail { fill: none; stroke: #5e4b2b; stroke-width: 3; stroke-linecap: round; }
      .bolt { fill: #6f5731; }
    </style>
  </defs>

  <g filter="url(#softShadow)">
    <ellipse cx="555" cy="505" rx="365" ry="42" fill="#000000" opacity="0.18"/>
