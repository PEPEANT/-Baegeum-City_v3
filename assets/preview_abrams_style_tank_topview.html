<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Abrams Style Tank Top View Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f0ead8;
        --muted: #aab1a4;
        --accent: #e1bd67;
        --surface: rgba(13, 17, 18, 0.9);
        --line: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 20%, rgba(225, 189, 103, 0.18), transparent 27%),
          radial-gradient(circle at 82% 68%, rgba(112, 150, 134, 0.16), transparent 26%),
          linear-gradient(135deg, #242c2a 0%, #111616 48%, #0a0d0e 100%);
      }

      .preview {
        width: min(1120px, calc(100vw - 44px));
        padding: 26px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(26, 32, 32, 0.92), var(--surface));
        box-shadow: 0 32px 88px rgba(0, 0, 0, 0.42);
      }

      .header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      .label {
        margin: 0 0 7px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 36px;
        line-height: 1.05;
      }

      .note {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .chip {
        flex: 0 0 auto;
        padding: 9px 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--accent);
        background: rgba(255, 255, 255, 0.045);
        font-size: 13px;
      }

      .stage {
        position: relative;
        min-height: 660px;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px),
          radial-gradient(circle at 50% 42%, rgba(234, 213, 157, 0.16), transparent 32%),
          linear-gradient(180deg, #566363 0%, #313b3d 54%, #202729 100%);
        background-size: 48px 48px, 48px 48px, auto, auto;
      }

      .stage::after {
        content: "";
        position: absolute;
        inset: auto 9% 58px;
        height: 28px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.28);
        filter: blur(16px);
      }

      img {
        position: absolute;
        inset: 50% auto auto 50%;
        width: min(82%, 820px);
        height: auto;
        transform: translate(-50%, -49%);
        display: block;
      }

      @media (max-width: 760px) {
        .preview {
          width: calc(100vw - 24px);
          padding: 16px;
        }

        .header {
          align-items: start;
          flex-direction: column;
        }

        h1 {
          font-size: 28px;
        }

        .stage {
          min-height: 520px;
        }

        img {
          width: 112%;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview">
      <section class="header">
        <div>
          <p class="label">Top View Redesign</p>
          <h1>Abrams Style Tank</h1>
          <p class="note">Top-down sprite silhouette with stronger hull geometry and readable armor zones.</p>
        </div>
        <div class="chip">SVG Top View</div>
      </section>
      <section class="stage">
        <img src="./abrams_style_tank_topview.svg" alt="Abrams style top-view tank SVG preview" />
      </section>
    </main>
  </body>
</html>
