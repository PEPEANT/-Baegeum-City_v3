      <path d="M228 304 C222 330 221 472 228 496" class="track-mark"/>
      <path d="M260 290 C252 326 252 474 260 510" class="track-mark"/>
      <path d="M292 276 C284 324 284 476 292 524" class="track-mark"/>
      <g fill="#1f2223" stroke="#777b77" stroke-width="5">
