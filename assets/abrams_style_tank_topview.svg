<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Abrams style tank top-view game asset</title>
  <desc id="desc">A redesigned top-view main battle tank SVG asset with Abrams-inspired proportions for a modern 2D game.</desc>
  <defs>
    <linearGradient id="hullSand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d9c28b"/>
      <stop offset="50%" stop-color="#b79255"/>
      <stop offset="100%" stop-color="#75603e"/>
    </linearGradient>
    <linearGradient id="panelGold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ead59d"/>
      <stop offset="100%" stop-color="#a77d42"/>
    </linearGradient>
    <linearGradient id="armorOlive" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#5f6a4b"/>
      <stop offset="100%" stop-color="#303826"/>
    </linearGradient>
    <linearGradient id="trackDark" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4a4f4e"/>
      <stop offset="100%" stop-color="#171a1b"/>
    </linearGradient>
    <linearGradient id="gunMetal" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d8c08a"/>
      <stop offset="45%" stop-color="#9b7742"/>
      <stop offset="100%" stop-color="#503b24"/>
    </linearGradient>
    <filter id="drop" x="-12%" y="-15%" width="124%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#060708" flood-opacity="0.35"/>
    </filter>
    <style>
      .outline { stroke: #211c14; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
      .thin { stroke: #332a1b; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
      .detail { fill: none; stroke: #6b5431; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .track-mark { stroke: #868a86; stroke-width: 7; stroke-linecap: round; opacity: 0.45; }
      .bolt { fill: #5c472b; }
    </style>
  </defs>

  <g filter="url(#drop)">
    <ellipse cx="600" cy="438" rx="395" ry="206" fill="#020303" opacity="0.18"/>

