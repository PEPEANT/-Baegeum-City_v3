<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Abrams Style Tank Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-top: #2f3941;
        --bg-bottom: #171c20;
        --panel: rgba(12, 16, 19, 0.82);
        --border: rgba(255, 255, 255, 0.08);
        --text: #efe8d1;
        --muted: #b2ac94;
        --accent: #d8c08b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 18%, rgba(255, 220, 140, 0.16), transparent 28%),
          radial-gradient(circle at 82% 26%, rgba(255, 255, 255, 0.08), transparent 22%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      }

      .frame {
        width: min(1120px, calc(100vw - 48px));
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(27, 33, 38, 0.88), var(--panel));
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }

      .meta {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
        margin-bottom: 20px;
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1;
      }

      .sub {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .badge {
        white-space: nowrap;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--accent);
        font-size: 13px;
      }

      .stage {
        position: relative;
        overflow: hidden;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: clamp(18px, 3vw, 34px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.06)),
          linear-gradient(180deg, #70818b 0%, #536068 40%, #31383d 100%);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.36), rgba(0, 0, 0, 0));
        pointer-events: none;
      }

      .ground {
        position: absolute;
        left: 6%;
        right: 6%;
        bottom: 34px;
        height: 12px;
        border-radius: 999px;
        background: rgba(18, 20, 22, 0.5);
        filter: blur(5px);
      }

      img {
        position: relative;
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="meta">
        <div>
          <p class="eyebrow">2D Game Asset Preview</p>
          <h1>Abrams Style Tank</h1>
          <p class="sub">Readable side-view silhouette for modern military game UI and unit presentation.</p>
        </div>
        <div class="badge">SVG Preview</div>
      </section>
      <section class="stage">
        <div class="ground"></div>
        <img src="./abrams_style_tank_2d.svg" alt="Abrams style tank SVG preview" />
      </section>
    </main>
  </body>
</html>
