<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>배금도시 v2</title>
    <link rel="icon" href="data:,">
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1411;
        --panel: rgba(20, 27, 23, 0.92);
        --line: rgba(242, 225, 170, 0.18);
        --ink: #fff4cf;
        --muted: rgba(255, 244, 207, 0.62);
        --accent: #f0c661;
        --green: #64d582;
        --blue: #74b9ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(135deg, rgba(6, 10, 8, 0.92), rgba(12, 22, 18, 0.9)),
          radial-gradient(circle at 78% 18%, rgba(116, 185, 255, 0.14), transparent 28%),
          var(--bg);
        color: var(--ink);
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 0.92fr) minmax(320px, 1.08fr);
        min-height: 100vh;
      }

      .launch-panel {
        display: grid;
        align-content: center;
        gap: 18px;
        padding: clamp(24px, 5vw, 72px);
        border-right: 1px solid var(--line);
        background: rgba(11, 16, 13, 0.58);
      }

      .eyebrow {
        color: var(--green);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        max-width: 620px;
        margin: 0;
        font-size: clamp(34px, 6vw, 68px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .status {
        max-width: 560px;
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .actions {
        display: grid;
        gap: 10px;
        max-width: 420px;
        margin-top: 10px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .primary-action,
      .secondary-action {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 54px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        font-size: 15px;
        font-weight: 800;
      }

      .primary-action {
        min-height: 64px;
        border-color: rgba(240, 198, 97, 0.72);
        background: linear-gradient(135deg, rgba(240, 198, 97, 0.24), rgba(100, 213, 130, 0.18));
        color: #fff8d8;
        font-size: 18px;
      }

      .primary-action span,
      .secondary-action span {
        color: var(--muted);
        font-size: 12px;
      }

      .mode-list {
        display: grid;
        gap: 10px;
        padding: clamp(24px, 5vw, 72px);
      }

      .race-preview {
        position: relative;
        min-height: 360px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(160deg, rgba(30, 42, 35, 0.98), rgba(18, 24, 22, 0.98)),
          #151b17;
      }

      .track-map {
        position: absolute;
        inset: 9%;
      }

      .track-map svg {
        width: 100%;
        height: 100%;
      }

      .runner-dot {
        position: absolute;
        width: 18px;
        height: 18px;
        border: 3px solid rgba(14, 18, 15, 0.9);
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 8px rgba(240, 198, 97, 0.16);
      }

      .runner-dot.one {
        left: 21%;
        top: 66%;
      }

      .runner-dot.two {
        left: 54%;
        top: 39%;
        background: var(--green);
      }

      .runner-dot.three {
        left: 78%;
        top: 56%;
        background: var(--blue);
      }

      .preview-label {
        position: absolute;
        left: 18px;
        bottom: 16px;
        display: grid;
        gap: 4px;
      }

      .preview-label strong {
        font-size: 22px;
      }

      .preview-label span {
        color: var(--muted);
        font-size: 13px;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .secondary-action {
        min-height: 82px;
        align-items: flex-start;
        flex-direction: column;
        padding: 14px;
      }

      .secondary-action.is-muted {
        opacity: 0.72;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }

        .launch-panel {
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .mode-list {
          padding-top: 18px;
        }

        .race-preview {
          min-height: 260px;
        }

        .mode-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body data-primary-mode="singularity-race">
    <main>
      <section class="launch-panel" aria-labelledby="mainTitle">
        <span class="eyebrow">MAIN MODE</span>
        <h1 id="mainTitle">특이점레이스</h1>
        <p class="status">배금도시 v2의 첫 완성 목표는 한 판이 시작되고 끝나는 안정적인 레이스입니다.</p>
        <div class="actions">
          <a id="primaryRaceLink" class="primary-action" href="./singularity-race.html">
            특이점레이스 시작
            <span>0.1</span>
          </a>
          <a class="secondary-action" href="./singularity-race-admin.html?devOnline=1">
            운영 화면
            <span>host</span>
          </a>
        </div>
      </section>

      <section class="mode-list" aria-label="배금도시 모드">
        <div class="race-preview" aria-hidden="true">
          <div class="track-map">
            <svg viewBox="0 0 1000 620" role="img" aria-label="특이점레이스 트랙">
              <path d="M82 466 C178 282 292 250 408 362 S646 546 824 390 C936 292 848 124 696 180 C536 238 502 80 334 112 C210 136 170 256 258 328" fill="none" stroke="rgba(10, 13, 11, 0.72)" stroke-width="86" stroke-linecap="round"/>
              <path d="M82 466 C178 282 292 250 408 362 S646 546 824 390 C936 292 848 124 696 180 C536 238 502 80 334 112 C210 136 170 256 258 328" fill="none" stroke="rgba(222, 204, 147, 0.7)" stroke-width="56" stroke-linecap="round"/>
              <path d="M82 466 C178 282 292 250 408 362 S646 546 824 390 C936 292 848 124 696 180 C536 238 502 80 334 112 C210 136 170 256 258 328" fill="none" stroke="rgba(255, 246, 198, 0.38)" stroke-width="4" stroke-linecap="round" stroke-dasharray="20 18"/>
            </svg>
          </div>
          <span class="runner-dot one"></span>
          <span class="runner-dot two"></span>
          <span class="runner-dot three"></span>
          <div class="preview-label">
            <strong>30 Runner Race</strong>
            <span>fixed camera / mobile controls / result loop</span>
          </div>
        </div>

        <div class="mode-grid">
          <a class="secondary-action is-muted" href="./baegeum-city-v2-dice.html">
            배금도시 허브
            <span>sub mode</span>
          </a>
          <a class="secondary-action is-muted" href="./baegeum-city-v2-dice.html?map=dice-city&spawn=dice-blackjack-casino-01">
            다이스시티
            <span>held</span>
          </a>
          <a class="secondary-action is-muted" href="./editor.html">
            월드 에디터
            <span>tools</span>
          </a>
          <a class="secondary-action is-muted" href="./skin-lab.html">
            스킨 테스트장
            <span>lab</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
